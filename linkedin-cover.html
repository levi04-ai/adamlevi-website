<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .cover {
            width: 1584px;
            height: 396px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            font-family: 'Heebo', sans-serif;
        }
        .cover::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(62,201,176,0.15) 0%, transparent 60%);
        }
        .cover::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: 10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,168,73,0.1) 0%, transparent 60%);
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 0 120px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 140px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.04em;
            line-height: 1;
            margin: 0;
        }
        h1 .highlight {
            color: #3ec9b0;
        }
        .avatar {
            position: absolute;
            left: 80px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            z-index: 2;
            display: none;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="cover">
        <div class="content">
            <h1><span class="highlight">Stories</span> Before Tools</h1>
        </div>
    </div>
</body>
</html>
